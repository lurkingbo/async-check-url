version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - '${API_PORT}:$8080'
    volumes:
      - type: bind
        source: ./
        target: /app/
        consistency: delegated
      - /app/node_modules
    env_file:
      - .env
    networks:
      - acu-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - '${WEB_PORT}:5173'
    volumes:
      - type: bind
        source: ./web
        target: /app/
        consistency: delegated
      - /app/node_modules
    env_file:
      - .env
    networks:
      - acu-network
    depends_on:
      - api

networks:
  acu-network:
    name: acu-network
    driver: bridge
    external: true
